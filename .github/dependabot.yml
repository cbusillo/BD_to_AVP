---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    groups:
      all-version-updates:
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python:uv
    groups:
      all-version-updates:
        patterns:
          - "*"
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
