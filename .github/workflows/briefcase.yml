---
name: Release from protected main

"on":
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional notes prepended to the generated GitHub release notes
        required: false
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Run guarded signed-release engine
    uses: ./.github/workflows/release-engine.yml
    with:
      release_notes: ${{ inputs.release_notes }}
      release_sha: ${{ github.sha }}
      operator_workflow_ref: ${{ github.workflow_ref }}
      operator_workflow_sha: ${{ github.workflow_sha }}
      operator_run_id: ${{ github.run_id }}
      operator_run_attempt: ${{ github.run_attempt }}
      operator_actor: ${{ github.actor }}
      operator_triggering_actor: ${{ github.triggering_actor }}
    permissions:
      attestations: write
      contents: write
      id-token: write
      pages: write

  publish-pypi:
    name: Publish stable Python distribution with trusted publishing
    needs: release
    if: >-
      !cancelled() &&
      needs.release.result == 'success' &&
      needs.release.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/bd-to-avp
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Verify reusable release authorization
        env:
          ENGINE_WORKFLOW_REF: ${{ needs.release.outputs.engine_workflow_ref }}
          ENGINE_WORKFLOW_SHA: ${{ needs.release.outputs.engine_workflow_sha }}
          OPERATOR_WORKFLOW_REF: ${{ needs.release.outputs.operator_workflow_ref }}
          OPERATOR_WORKFLOW_SHA: ${{ needs.release.outputs.operator_workflow_sha }}
          RELEASE_POLICY_FINGERPRINT: ${{ needs.release.outputs.release_policy_fingerprint }}
          RELEASE_SHA: ${{ needs.release.outputs.release_sha }}
          PYTHON_ARTIFACT_DIGEST: ${{ needs.release.outputs.python_artifact_digest }}
          PYTHON_ARTIFACT_ID: ${{ needs.release.outputs.python_artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          EXPECTED_OPERATOR_REF="$GITHUB_REPOSITORY/.github/workflows/briefcase.yml@refs/heads/main"
          EXPECTED_ENGINE_REF="$GITHUB_REPOSITORY/.github/workflows/release-engine.yml@refs/heads/main"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_SHA" = "$RELEASE_SHA"
          test "$OPERATOR_WORKFLOW_REF" = "$EXPECTED_OPERATOR_REF"
          test "$OPERATOR_WORKFLOW_SHA" = "$GITHUB_SHA"
          test "$ENGINE_WORKFLOW_REF" = "$EXPECTED_ENGINE_REF"
          test "$ENGINE_WORKFLOW_SHA" = "$GITHUB_SHA"
          test "$GITHUB_ACTOR" = "shiny-code-bot"
          test "$GITHUB_TRIGGERING_ACTOR" = "shiny-code-bot"
          case "$RELEASE_POLICY_FINGERPRINT" in
            (*[!0-9a-f]*|'') echo "Invalid release policy fingerprint." >&2; exit 1 ;;
          esac
          test "${#RELEASE_POLICY_FINGERPRINT}" -eq 64
          case "$PYTHON_ARTIFACT_DIGEST" in
            (*[!0-9a-f]*|'') echo "Invalid Python artifact digest." >&2; exit 1 ;;
          esac
          test "${#PYTHON_ARTIFACT_DIGEST}" -eq 64
          case "$PYTHON_ARTIFACT_ID" in
            (*[!0-9]*|'') echo "Invalid Python artifact ID." >&2; exit 1 ;;
          esac
          MAIN_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)
          if [ "$MAIN_SHA" != "$GITHUB_SHA" ]; then
            echo "Protected main moved before PyPI publication." >&2
            exit 1
          fi
          ARTIFACT_DIGEST=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/artifacts/$PYTHON_ARTIFACT_ID" \
            --jq .digest)
          test "$ARTIFACT_DIGEST" = "sha256:$PYTHON_ARTIFACT_DIGEST"

      - name: Download checksummed Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          artifact-ids: ${{ needs.release.outputs.python_artifact_id }}
          merge-multiple: true
          path: python-distributions

      - name: Verify Python distribution transfer
        run: |
          set -euo pipefail
          cd python-distributions
          test -f SHA256SUMS
          test -d dist
          test -z "$(find dist -type l -print -quit)"
          shasum -a 256 --check SHA256SUMS
          EXPECTED_FILES=$(awk '{print $2}' SHA256SUMS | LC_ALL=C sort)
          ACTUAL_FILES=$(find dist -type f -print | LC_ALL=C sort)
          if [ "$EXPECTED_FILES" != "$ACTUAL_FILES" ]; then
            echo "Python distribution checksum manifest does not match the artifact contents." >&2
            exit 1
          fi

      - name: Publish with PyPI trusted publishing and attestations
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          packages-dir: python-distributions/dist
