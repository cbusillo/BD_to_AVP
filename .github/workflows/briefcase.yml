---
name: Release from protected main

"on":
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional notes prepended to the generated GitHub release notes
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release source and metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      package_version: ${{ steps.metadata.outputs.package_version }}
      build_version: ${{ steps.metadata.outputs.build_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      channel: ${{ steps.metadata.outputs.channel }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      make_latest: ${{ steps.metadata.outputs.make_latest }}
      publish_pypi: ${{ steps.metadata.outputs.publish_pypi }}
      base_snapshot_tag: ${{ steps.feed_state.outputs.base_snapshot_tag }}
    steps:
      - name: Checkout dispatch commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Require the current protected main commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Releases must be dispatched from protected main." >&2
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$EXPECTED_SHA" ]; then
            echo "Checkout does not match github.sha." >&2
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if [ "$(git rev-parse refs/remotes/origin/main)" != "$EXPECTED_SHA" ]; then
            echo "The dispatch commit is no longer the current main HEAD." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Derive committed release metadata
        id: metadata
        run: python scripts/release.py metadata --github-output "$GITHUB_OUTPUT"

      - name: Reject existing release identity
        env:
          EXPECTED_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.metadata.outputs.prerelease }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
        run: |
          set -euo pipefail
          TAG_REFS=$(git ls-remote --tags origin \
            "refs/tags/$RELEASE_TAG" \
            "refs/tags/$RELEASE_TAG^{}")
          TAG_SHA=$(awk '
            $2 ~ /\^\{\}$/ { peeled = $1 }
            $2 !~ /\^\{\}$/ { direct = $1 }
            END { print peeled != "" ? peeled : direct }
          ' <<< "$TAG_REFS")
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > release-identities.json
          RELEASE_COUNT=$(jq -r --arg tag "$RELEASE_TAG" \
            '[.[][] | select(.tag_name == $tag)] | length' \
            release-identities.json)
          if [ "$RELEASE_COUNT" = "0" ]; then
            if [ -n "$TAG_SHA" ]; then
              echo "Release tag already exists without a resumable draft: $RELEASE_TAG" >&2
              exit 1
            fi
          elif [ "$RELEASE_COUNT" = "1" ]; then
            RELEASE_JSON=$(jq -c --arg tag "$RELEASE_TAG" \
              '.[][] | select(.tag_name == $tag)' \
              release-identities.json)
            if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "true" ] \
              || [ "$(jq -r .target_commitish <<< "$RELEASE_JSON")" != "$EXPECTED_SHA" ] \
              || [ "$(jq -r .prerelease <<< "$RELEASE_JSON")" != "$PRERELEASE" ]; then
              echo "Existing release cannot be safely resumed: $RELEASE_TAG" >&2
              exit 1
            fi
            if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$EXPECTED_SHA" ]; then
              echo "Existing draft tag does not target the dispatch commit." >&2
              exit 1
            fi
          else
            echo "Multiple GitHub Releases use tag $RELEASE_TAG." >&2
            exit 1
          fi

      - name: Resolve active and durable appcast state
        id: feed_state
        env:
          BUILD_VERSION: ${{ steps.metadata.outputs.build_version }}
          GH_TOKEN: ${{ github.token }}
          SHORT_VERSION: ${{ steps.metadata.outputs.package_version }}
        run: |
          set -euo pipefail
          mkdir -p release-preflight/active release-preflight/latest

          fetch_url() {
            local url="$1"
            local output="$2"
            local status
            local exit_code
            set +e
            status=$(curl --location --silent --show-error \
              --retry 3 --retry-delay 2 --retry-all-errors \
              --connect-timeout 10 --max-time 45 \
              --output "$output" --write-out '%{http_code}' "$url")
            exit_code=$?
            set -e
            if [ "$exit_code" -ne 0 ]; then
              rm -f "$output"
              printf '000\n'
            else
              printf '%s\n' "$status"
            fi
          }

          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > release-preflight/releases.json
          LATEST_SNAPSHOT_TAG=$(jq -r '
            [
              .[][]
              | select(.draft == false)
              | select(any(.assets[]?; .name == "appcast.xml"))
            ]
            | sort_by(.published_at)
            | reverse
            | .[0].tag_name // empty
          ' release-preflight/releases.json)

          CACHE_KEY="$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          STATE_STATUS=$(fetch_url \
            "https://cbusillo.github.io/BD_to_AVP/appcast-state.json?run=$CACHE_KEY" \
            release-preflight/appcast-state.json)
          if [ "$STATE_STATUS" = "200" ]; then
            if ! jq -e '
              type == "object"
              and .schema == 1
              and (
                .status == "disabled"
                or (
                  .status == "enabled"
                  and (.release_tag | type == "string")
                  and (.appcast_sha256 | test("^[0-9a-f]{64}$"))
                )
              )
            ' release-preflight/appcast-state.json >/dev/null; then
              echo "Published Sparkle state is invalid; restore a known-good snapshot." >&2
              exit 1
            fi
            if [ "$(jq -r .status release-preflight/appcast-state.json)" = "disabled" ]; then
              echo "Sparkle updates are disabled; restore a known-good snapshot before releasing." >&2
              exit 1
            fi

            BASE_SNAPSHOT_TAG=$(jq -r .release_tag release-preflight/appcast-state.json)
            STATE_APPCAST_SHA256=$(jq -r .appcast_sha256 release-preflight/appcast-state.json)
            python scripts/release.py validate-tag "$BASE_SNAPSHOT_TAG" >/dev/null
            BASE_RELEASE_COUNT=$(jq -r --arg tag "$BASE_SNAPSHOT_TAG" '
              [
                .[][]
                | select(.draft == false and .tag_name == $tag)
                | select(any(.assets[]?; .name == "appcast.xml"))
              ]
              | length
            ' release-preflight/releases.json)
            if [ "$BASE_RELEASE_COUNT" != "1" ]; then
              echo "Published Sparkle state does not name one durable release snapshot." >&2
              exit 1
            fi
            gh release download "$BASE_SNAPSHOT_TAG" \
              --pattern appcast.xml \
              --dir release-preflight/active
            python scripts/sparkle_appcast.py validate-snapshot \
              --feed release-preflight/active/appcast.xml \
              --short-version "${BASE_SNAPSHOT_TAG#v}"
            ACTIVE_SHA256=$(sha256sum release-preflight/active/appcast.xml | awk '{print $1}')
            if [ "$ACTIVE_SHA256" != "$STATE_APPCAST_SHA256" ]; then
              echo "Published Sparkle state digest differs from its durable snapshot." >&2
              exit 1
            fi

            LIVE_STATUS=$(fetch_url \
              "https://cbusillo.github.io/BD_to_AVP/appcast.xml?run=$CACHE_KEY" \
              release-preflight/live-appcast.xml)
            if [ "$LIVE_STATUS" != "200" ]; then
              echo "Unable to verify the active Sparkle feed; HTTP $LIVE_STATUS." >&2
              exit 1
            fi
            python scripts/sparkle_appcast.py validate \
              --feed release-preflight/live-appcast.xml
            LIVE_SHA256=$(sha256sum release-preflight/live-appcast.xml | awk '{print $1}')
            if [ "$LIVE_SHA256" != "$STATE_APPCAST_SHA256" ]; then
              echo "Live Sparkle feed differs from the active durable snapshot." >&2
              exit 1
            fi
          elif [ "$STATE_STATUS" = "404" ]; then
            if [ -n "$LATEST_SNAPSHOT_TAG" ]; then
              echo "Sparkle state is missing despite durable snapshots; restore one before releasing." >&2
              exit 1
            fi
            BASE_SNAPSHOT_TAG=bootstrap
            LIVE_STATUS=$(fetch_url \
              "https://cbusillo.github.io/BD_to_AVP/appcast.xml?run=$CACHE_KEY" \
              release-preflight/active/appcast.xml)
            if [ "$LIVE_STATUS" = "200" ]; then
              python scripts/sparkle_appcast.py validate-empty \
                --feed release-preflight/active/appcast.xml
            elif [ "$LIVE_STATUS" = "404" ]; then
              cp sparkle-feed/appcast.xml release-preflight/active/appcast.xml
            else
              echo "Unable to verify bootstrap Sparkle feed; HTTP $LIVE_STATUS." >&2
              exit 1
            fi
          else
            echo "Unable to verify Sparkle deployment state; HTTP $STATE_STATUS." >&2
            exit 1
          fi

          python scripts/sparkle_appcast.py check-release \
            --feed release-preflight/active/appcast.xml \
            --build-version "$BUILD_VERSION" \
            --short-version "$SHORT_VERSION"

          if [ -n "$LATEST_SNAPSHOT_TAG" ] \
            && [ "$LATEST_SNAPSHOT_TAG" != "$BASE_SNAPSHOT_TAG" ]; then
            gh release download "$LATEST_SNAPSHOT_TAG" \
              --pattern appcast.xml \
              --dir release-preflight/latest
            python scripts/sparkle_appcast.py validate-snapshot \
              --feed release-preflight/latest/appcast.xml \
              --short-version "${LATEST_SNAPSHOT_TAG#v}"
            python scripts/sparkle_appcast.py check-release \
              --feed release-preflight/latest/appcast.xml \
              --build-version "$BUILD_VERSION" \
              --short-version "$SHORT_VERSION"
          fi
          echo "base_snapshot_tag=$BASE_SNAPSHOT_TAG" >> "$GITHUB_OUTPUT"

      - name: Reject an existing stable PyPI version
        if: steps.metadata.outputs.publish_pypi == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.metadata.outputs.package_version }}
        run: |
          set -euo pipefail
          STATUS=$(curl --location --silent --output /dev/null --write-out '%{http_code}' \
            "https://pypi.org/pypi/bd-to-avp/$PACKAGE_VERSION/json")
          case "$STATUS" in
            404) ;;
            200)
              echo "PyPI version already exists: $PACKAGE_VERSION" >&2
              exit 1
              ;;
            *)
              echo "Unable to verify PyPI version availability; HTTP $STATUS." >&2
              exit 1
              ;;
          esac

  package:
    name: Build, sign, notarize, and validate DMG
    needs: prepare
    runs-on: macos-15
    timeout-minutes: 120
    environment: macos-signing
    permissions:
      contents: read
    outputs:
      dmg_name: ${{ steps.package_artifact.outputs.dmg_name }}
      dmg_sha256: ${{ steps.package_artifact.outputs.dmg_sha256 }}
      dmg_size: ${{ steps.package_artifact.outputs.dmg_size }}
    steps:
      - name: Checkout validated main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Verify checkout identity
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --locked --all-groups --python 3.12

      - name: Generate ephemeral build keychain password
        run: |
          set -euo pipefail
          BUILD_KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          echo "::add-mask::$BUILD_KEYCHAIN_PASSWORD"
          echo "BUILD_KEYCHAIN_PASSWORD=$BUILD_KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Install certificates
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_INSTALLER: ${{ secrets.CERTIFICATE_INSTALLER }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$(pwd)/build.keychain"
          security create-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          USER_KEYCHAINS=()
          while IFS= read -r keychain; do
            USER_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | sed 's/[" ]//g')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${USER_KEYCHAINS[@]}"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          printf '%s' "$CERTIFICATE" | base64 --decode > app_certificate.p12
          printf '%s' "$CERTIFICATE_INSTALLER" | base64 --decode > installer_certificate.p12
          security import app_certificate.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -T "/usr/bin/codesign" -T "/usr/bin/productsign"
          security import installer_certificate.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -T "/usr/bin/codesign" -T "/usr/bin/productsign"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productsign: \
            -s -k "$BUILD_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          KEYCHAIN_NAME: ${{ secrets.KEYCHAIN_NAME }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "$KEYCHAIN_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID"

      - name: Package application for GitHub
        id: package_artifact
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          DEV_ID: ${{ secrets.DEV_ID }}
          PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$(pwd)/build.keychain"
          uv run python scripts/briefcase_app.py create
          uv run python scripts/briefcase_app.py build
          find . -name QtWebEngineCore.framework -type d | while read -r dir; do
            find "$dir" -type f -execdir codesign --force --verify --verbose \
              --sign "$DEV_ID" {} \;
          done
          find build/bd-to-avp/macos/app -path "*/bd_to_avp/bin/*" -type f -perm +111 \
            -exec codesign --force --options runtime --timestamp \
              --sign "$DEV_ID" {} \;
          find build/bd-to-avp/macos/app -name "*.dylib" \
            -exec codesign --force --sign - {} \;
          uv run python scripts/verify_app_tools.py --profile release
          uv run python scripts/sparkle_bundle.py \
            --app "build/bd-to-avp/macos/app/3D Blu-ray to Vision Pro.app" \
            > app-metadata.json
          if [ "$(jq -r .short_version app-metadata.json)" != "$PACKAGE_VERSION" ]; then
            echo "Built app version does not match $PACKAGE_VERSION." >&2
            exit 1
          fi
          uv run python scripts/briefcase_app.py package -i "$DEV_ID"
          uv run python scripts/sparkle_bundle.py \
            --app "build/bd-to-avp/macos/app/3D Blu-ray to Vision Pro.app" \
            --verify-signatures

          DMG_COUNT=$(find dist -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')
          if [ "$DMG_COUNT" != "1" ]; then
            echo "Expected exactly one DMG in dist; found $DMG_COUNT." >&2
            exit 1
          fi
          DMG_PATH=$(find dist -maxdepth 1 -type f -name '*.dmg' -print -quit)
          uv run python scripts/sparkle_bundle.py \
            --dmg "$DMG_PATH" \
            --verify-signatures \
            --verify-distribution \
            > dmg-metadata.json
          if [ "$(jq -r .short_version dmg-metadata.json)" != "$PACKAGE_VERSION" ]; then
            echo "Packaged DMG version does not match $PACKAGE_VERSION." >&2
            exit 1
          fi
          if [ "$(jq -r .build_version dmg-metadata.json)" != "$BUILD_VERSION" ]; then
            echo "Packaged DMG build does not match $BUILD_VERSION." >&2
            exit 1
          fi
          DMG_NAME=$(basename "$DMG_PATH")
          DMG_SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          DMG_SIZE=$(stat -f %z "$DMG_PATH")
          printf '%s  %s\n' "$DMG_SHA256" "$DMG_NAME" > dist/SHA256SUMS
          {
            echo "dmg_name=$DMG_NAME"
            echo "dmg_sha256=$DMG_SHA256"
            echo "dmg_size=$DMG_SIZE"
          } >> "$GITHUB_OUTPUT"

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: briefcase-log
          path: /Users/runner/work/BD_to_AVP/BD_to_AVP/logs/briefcase.*.log

      - name: Remove temporary signing material
        if: always()
        run: |
          rm -f app_certificate.p12 installer_certificate.p12
          security delete-keychain "$(pwd)/build.keychain" >/dev/null 2>&1 || true

      - name: Upload verified release package
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-package
          path: |
            dist/*.dmg
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  attest-package:
    name: Attest verified release package
    needs:
      - prepare
      - package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download verified release package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-package
          path: release-package

      - name: Verify package identity before attestation
        env:
          EXPECTED_DMG_NAME: ${{ needs.package.outputs.dmg_name }}
          EXPECTED_DMG_SHA256: ${{ needs.package.outputs.dmg_sha256 }}
          EXPECTED_DMG_SIZE: ${{ needs.package.outputs.dmg_size }}
        run: |
          set -euo pipefail
          DMG_PATH="release-package/$EXPECTED_DMG_NAME"
          test -f "$DMG_PATH"
          test "$(sha256sum "$DMG_PATH" | awk '{print $1}')" = "$EXPECTED_DMG_SHA256"
          test "$(stat -c %s "$DMG_PATH")" = "$EXPECTED_DMG_SIZE"
          test "$(cat release-package/SHA256SUMS)" = \
            "$EXPECTED_DMG_SHA256  $EXPECTED_DMG_NAME"
          (cd release-package && sha256sum --check SHA256SUMS)

      - name: Attest package provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-package/${{ needs.package.outputs.dmg_name }}

  build-python:
    name: Build stable Python distributions
    needs: prepare
    if: needs.prepare.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout released commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Validate and build distributions
        run: |
          python scripts/release.py validate
          uv build

      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  create-draft:
    name: Create draft GitHub Release
    needs:
      - prepare
      - package
      - attest-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download verified release package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-package
          path: release-package

      - name: Verify artifact transfer
        env:
          EXPECTED_DMG_NAME: ${{ needs.package.outputs.dmg_name }}
          EXPECTED_DMG_SHA256: ${{ needs.package.outputs.dmg_sha256 }}
          EXPECTED_DMG_SIZE: ${{ needs.package.outputs.dmg_size }}
        run: |
          set -euo pipefail
          DMG_PATH="release-package/$EXPECTED_DMG_NAME"
          if [ ! -f "$DMG_PATH" ]; then
            echo "Expected DMG is missing from the workflow artifact." >&2
            exit 1
          fi
          if [ "$(sha256sum "$DMG_PATH" | awk '{print $1}')" != "$EXPECTED_DMG_SHA256" ]; then
            echo "Workflow artifact DMG digest mismatch." >&2
            exit 1
          fi
          if [ "$(stat -c %s "$DMG_PATH")" != "$EXPECTED_DMG_SIZE" ]; then
            echo "Workflow artifact DMG size mismatch." >&2
            exit 1
          fi
          EXPECTED_SUM="$EXPECTED_DMG_SHA256  $EXPECTED_DMG_NAME"
          if [ "$(cat release-package/SHA256SUMS)" != "$EXPECTED_SUM" ]; then
            echo "SHA256SUMS does not exactly describe the validated DMG." >&2
            exit 1
          fi
          (cd release-package && sha256sum --check SHA256SUMS)

      - name: Create or resume immutable-intent draft
        env:
          EXPECTED_DMG_NAME: ${{ needs.package.outputs.dmg_name }}
          GH_TOKEN: ${{ github.token }}
          MAKE_LATEST: ${{ needs.prepare.outputs.make_latest }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          MAIN_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)
          if [ "$MAIN_SHA" != "$GITHUB_SHA" ]; then
            echo "main advanced after release validation; refusing to create a draft." >&2
            exit 1
          fi
          {
            if [ -n "$RELEASE_NOTES_INPUT" ]; then
              printf '%s\n\n' "$RELEASE_NOTES_INPUT"
            fi
            cat <<'NOTES'
          The GUI app does not install Homebrew or command-line dependencies
          on first launch. Install MakeMKV separately before converting Blu-ray
          discs. Power users who use the terminal/PyPI version should follow
          the manual dependency instructions in the README.

          The packaged command-line entry point is available inside the app at
          `Contents/MacOS/3D Blu-ray to Vision Pro`. Launching it with arguments
          uses terminal mode; launching it without arguments opens the GUI.
          NOTES
          } > release-notes-prefix.md

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            RELEASE_JSON=$(gh api \
              "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
            if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "true" ] \
              || [ "$(jq -r .target_commitish <<< "$RELEASE_JSON")" != "$GITHUB_SHA" ] \
              || [ "$(jq -r .prerelease <<< "$RELEASE_JSON")" != "$PRERELEASE" ]; then
              echo "Existing release cannot be safely resumed." >&2
              exit 1
            fi
          else
            if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
              >/dev/null 2>&1; then
              echo "Git tag already exists without a resumable draft: $RELEASE_TAG" >&2
              exit 1
            fi
            RELEASE_ARGS=(
              "$RELEASE_TAG"
              --draft
              --fail-on-no-commits
              --generate-notes
              --latest=false
              --notes-file release-notes-prefix.md
              --target "$GITHUB_SHA"
              --title "$RELEASE_NAME"
            )
            if [ "$PRERELEASE" = "true" ]; then
              RELEASE_ARGS+=(--prerelease)
            fi
            gh release create "${RELEASE_ARGS[@]}"
          fi

          mkdir -p existing-package-assets
          for ASSET_NAME in "$EXPECTED_DMG_NAME" SHA256SUMS; do
            ASSET_PATH="release-package/$ASSET_NAME"
            RELEASE_JSON=$(gh api \
              "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
            ASSET_COUNT=$(jq -r --arg name "$ASSET_NAME" \
              '[.assets[] | select(.name == $name)] | length' \
              <<< "$RELEASE_JSON")
            case "$ASSET_COUNT" in
              0)
                gh release upload "$RELEASE_TAG" "$ASSET_PATH"
                ;;
              1)
                rm -f "existing-package-assets/$ASSET_NAME"
                gh release download "$RELEASE_TAG" \
                  --pattern "$ASSET_NAME" \
                  --dir existing-package-assets
                if [ "$(sha256sum "$ASSET_PATH" | awk '{print $1}')" \
                  != "$(sha256sum "existing-package-assets/$ASSET_NAME" | awk '{print $1}')" ]; then
                  echo "Existing draft asset differs from $ASSET_NAME." >&2
                  exit 1
                fi
                ;;
              *)
                echo "Draft release contains duplicate assets named $ASSET_NAME." >&2
                exit 1
                ;;
            esac
          done

          RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
          if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "true" ]; then
            echo "Release must remain a draft until all assets are verified." >&2
            exit 1
          fi
          if [ "$(jq -r .target_commitish <<< "$RELEASE_JSON")" != "$GITHUB_SHA" ]; then
            echo "Draft release does not target github.sha." >&2
            exit 1
          fi
          if [ "$(jq -r .prerelease <<< "$RELEASE_JSON")" != "$PRERELEASE" ]; then
            echo "Draft prerelease state does not match the committed version." >&2
            exit 1
          fi
          if [ "$MAKE_LATEST" = "true" ] && [ "$PRERELEASE" = "true" ]; then
            echo "A prerelease cannot be marked latest." >&2
            exit 1
          fi

  publish-appcast:
    name: Build signed cumulative appcast snapshot
    needs:
      - prepare
      - package
      - create-draft
    runs-on: macos-15
    timeout-minutes: 30
    environment: sparkle-release
    permissions:
      contents: read
    outputs:
      appcast_sha256: ${{ steps.sign_appcast.outputs.appcast_sha256 }}
      appcast_size: ${{ steps.sign_appcast.outputs.appcast_size }}
    steps:
      - name: Checkout protected release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Download and verify draft DMG
        id: release_asset
        env:
          EXPECTED_DMG_NAME: ${{ needs.package.outputs.dmg_name }}
          EXPECTED_DMG_SHA256: ${{ needs.package.outputs.dmg_sha256 }}
          EXPECTED_DMG_SIZE: ${{ needs.package.outputs.dmg_size }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p appcast-site release-assets
          gh release download "$RELEASE_TAG" \
            --pattern "$EXPECTED_DMG_NAME" \
            --dir release-assets
          DMG_PATH="release-assets/$EXPECTED_DMG_NAME"
          if [ ! -f "$DMG_PATH" ]; then
            echo "Expected draft DMG was not downloaded." >&2
            exit 1
          fi
          ACTUAL_SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_DMG_SHA256" ]; then
            echo "Draft DMG digest does not match the validated package." >&2
            exit 1
          fi
          ACTUAL_SIZE=$(stat -f %z "$DMG_PATH")
          if [ "$ACTUAL_SIZE" != "$EXPECTED_DMG_SIZE" ]; then
            echo "Draft DMG size does not match the validated package." >&2
            exit 1
          fi

          RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
          if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "true" ]; then
            echo "Appcast signing requires an unpublished draft release." >&2
            exit 1
          fi
          ASSET_COUNT=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '[.assets[] | select(.name == $name)] | length' <<< "$RELEASE_JSON")
          if [ "$ASSET_COUNT" != "1" ]; then
            echo "Expected exactly one draft DMG asset; found $ASSET_COUNT." >&2
            exit 1
          fi
          ASSET_URL=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '.assets[] | select(.name == $name) | .browser_download_url' <<< "$RELEASE_JSON")
          ASSET_SIZE=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '.assets[] | select(.name == $name) | .size' <<< "$RELEASE_JSON")
          if [ "$ASSET_SIZE" != "$EXPECTED_DMG_SIZE" ]; then
            echo "GitHub draft asset size does not match the validated package." >&2
            exit 1
          fi
          {
            echo "dmg_path=$DMG_PATH"
            echo "asset_url=$ASSET_URL"
            echo "asset_size=$ASSET_SIZE"
            echo "created_at=$(jq -r .created_at <<< "$RELEASE_JSON")"
          } >> "$GITHUB_OUTPUT"

      - name: Inspect draft DMG
        id: bundle
        env:
          DMG_PATH: ${{ steps.release_asset.outputs.dmg_path }}
          EXPECTED_BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          EXPECTED_SHORT_VERSION: ${{ needs.prepare.outputs.package_version }}
        run: |
          set -euo pipefail
          python scripts/sparkle_bundle.py \
            --dmg "$DMG_PATH" \
            --release-artifact \
            --verify-signatures \
            --verify-distribution \
            > bundle-metadata.json
          if [ "$(jq -r .short_version bundle-metadata.json)" != "$EXPECTED_SHORT_VERSION" ]; then
            echo "Draft DMG short version does not match the committed version." >&2
            exit 1
          fi
          if [ "$(jq -r .build_version bundle-metadata.json)" != "$EXPECTED_BUILD_VERSION" ]; then
            echo "Draft DMG build version does not match the committed build." >&2
            exit 1
          fi
          {
            echo "build_version=$(jq -r .build_version bundle-metadata.json)"
            echo "short_version=$(jq -r .short_version bundle-metadata.json)"
            echo "minimum_system_version=$(jq -r .minimum_system_version bundle-metadata.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Load active durable appcast snapshot
        env:
          BASE_SNAPSHOT_TAG: ${{ needs.prepare.outputs.base_snapshot_tag }}
          BUILD_VERSION: ${{ steps.bundle.outputs.build_version }}
          GH_TOKEN: ${{ github.token }}
          SHORT_VERSION: ${{ steps.bundle.outputs.short_version }}
        run: |
          set -euo pipefail
          if [ "$BASE_SNAPSHOT_TAG" = "bootstrap" ]; then
            cp sparkle-feed/appcast.xml appcast-site/appcast.xml
          else
            python scripts/release.py validate-tag "$BASE_SNAPSHOT_TAG" >/dev/null
            gh release download "$BASE_SNAPSHOT_TAG" \
              --pattern appcast.xml \
              --dir appcast-site
            python scripts/sparkle_appcast.py validate-snapshot \
              --feed appcast-site/appcast.xml \
              --short-version "${BASE_SNAPSHOT_TAG#v}"
          fi
          python scripts/sparkle_appcast.py validate \
            --feed appcast-site/appcast.xml
          python scripts/sparkle_appcast.py check-release \
            --feed appcast-site/appcast.xml \
            --build-version "$BUILD_VERSION" \
            --short-version "$SHORT_VERSION"

      - name: Sign DMG and build appcast
        id: sign_appcast
        env:
          ASSET_SIZE: ${{ steps.release_asset.outputs.asset_size }}
          ASSET_URL: ${{ steps.release_asset.outputs.asset_url }}
          BUILD_VERSION: ${{ steps.bundle.outputs.build_version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          DMG_PATH: ${{ steps.release_asset.outputs.dmg_path }}
          MINIMUM_SYSTEM_VERSION: ${{ steps.bundle.outputs.minimum_system_version }}
          RELEASE_CREATED_AT: ${{ steps.release_asset.outputs.created_at }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          SHORT_VERSION: ${{ steps.bundle.outputs.short_version }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          set +x
          SIGN_UPDATE=$(python scripts/sparkle_macos.py --tool sign_update)
          SIGNATURE=$(printf '%s\n' "$SPARKLE_EDDSA_PRIVATE_KEY" | \
            "$SIGN_UPDATE" --ed-key-file - -p "$DMG_PATH")
          if [ -z "$SIGNATURE" ]; then
            echo "Sparkle did not produce an EdDSA signature." >&2
            exit 1
          fi
          printf '%s\n' "$SPARKLE_EDDSA_PRIVATE_KEY" | \
            "$SIGN_UPDATE" --verify --ed-key-file - "$DMG_PATH" "$SIGNATURE"
          python scripts/sparkle_appcast.py add \
            --feed appcast-site/appcast.xml \
            --output appcast-site/appcast.xml \
            --build-version "$BUILD_VERSION" \
            --short-version "$SHORT_VERSION" \
            --channel "$CHANNEL" \
            --download-url "$ASSET_URL" \
            --length "$ASSET_SIZE" \
            --signature "$SIGNATURE" \
            --release-notes-url "https://github.com/$GITHUB_REPOSITORY/releases/tag/$RELEASE_TAG" \
            --minimum-system-version "$MINIMUM_SYSTEM_VERSION" \
            --published-at "$RELEASE_CREATED_AT"
          python scripts/sparkle_appcast.py validate-snapshot \
            --feed appcast-site/appcast.xml \
            --short-version "$SHORT_VERSION"
          {
            echo "appcast_sha256=$(shasum -a 256 appcast-site/appcast.xml | awk '{print $1}')"
            echo "appcast_size=$(stat -f %z appcast-site/appcast.xml)"
          } >> "$GITHUB_OUTPUT"

      - name: Upload signed appcast for verification
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: signed-appcast
          path: appcast-site/appcast.xml
          if-no-files-found: error
          retention-days: 7

  verify-draft:
    name: Upload, re-download, and verify draft assets
    needs:
      - prepare
      - package
      - create-draft
      - publish-appcast
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      attestations: read
      contents: write
    steps:
      - name: Checkout protected verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Download signed appcast
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: signed-appcast
          path: signed-appcast

      - name: Upload appcast snapshot to draft
        env:
          EXPECTED_APPCAST_SHA256: ${{ needs.publish-appcast.outputs.appcast_sha256 }}
          EXPECTED_APPCAST_SIZE: ${{ needs.publish-appcast.outputs.appcast_size }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          LOCAL_APPCAST=signed-appcast/appcast.xml
          if [ "$(shasum -a 256 "$LOCAL_APPCAST" | awk '{print $1}')" != "$EXPECTED_APPCAST_SHA256" ]; then
            echo "Signed appcast workflow artifact digest mismatch." >&2
            exit 1
          fi
          if [ "$(stat -f %z "$LOCAL_APPCAST")" != "$EXPECTED_APPCAST_SIZE" ]; then
            echo "Signed appcast workflow artifact size mismatch." >&2
            exit 1
          fi

          RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
          if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "true" ]; then
            echo "Release was published before appcast verification." >&2
            exit 1
          fi
          APPCAST_COUNT=$(jq '[.assets[] | select(.name == "appcast.xml")] | length' <<< "$RELEASE_JSON")
          case "$APPCAST_COUNT" in
            0)
              gh release upload "$RELEASE_TAG" "$LOCAL_APPCAST"
              ;;
            1)
              mkdir -p existing-appcast
              gh release download "$RELEASE_TAG" \
                --pattern appcast.xml \
                --dir existing-appcast
              if [ "$(shasum -a 256 existing-appcast/appcast.xml | awk '{print $1}')" \
                != "$EXPECTED_APPCAST_SHA256" ]; then
                echo "Existing draft appcast asset differs from the signed snapshot." >&2
                exit 1
              fi
              ;;
            *)
              echo "Draft release contains duplicate appcast assets." >&2
              exit 1
              ;;
          esac

      - name: Re-download and verify every release boundary
        env:
          EXPECTED_APPCAST_SHA256: ${{ needs.publish-appcast.outputs.appcast_sha256 }}
          EXPECTED_APPCAST_SIZE: ${{ needs.publish-appcast.outputs.appcast_size }}
          EXPECTED_BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          EXPECTED_DMG_NAME: ${{ needs.package.outputs.dmg_name }}
          EXPECTED_DMG_SHA256: ${{ needs.package.outputs.dmg_sha256 }}
          EXPECTED_DMG_SIZE: ${{ needs.package.outputs.dmg_size }}
          EXPECTED_SHORT_VERSION: ${{ needs.prepare.outputs.package_version }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p verified-assets
          gh release download "$RELEASE_TAG" \
            --pattern "$EXPECTED_DMG_NAME" \
            --pattern SHA256SUMS \
            --pattern appcast.xml \
            --dir verified-assets

          DMG_PATH="verified-assets/$EXPECTED_DMG_NAME"
          if [ "$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')" != "$EXPECTED_DMG_SHA256" ]; then
            echo "Re-downloaded DMG digest mismatch." >&2
            exit 1
          fi
          if [ "$(stat -f %z "$DMG_PATH")" != "$EXPECTED_DMG_SIZE" ]; then
            echo "Re-downloaded DMG size mismatch." >&2
            exit 1
          fi
          EXPECTED_SUM="$EXPECTED_DMG_SHA256  $EXPECTED_DMG_NAME"
          if [ "$(cat verified-assets/SHA256SUMS)" != "$EXPECTED_SUM" ]; then
            echo "Re-downloaded checksum manifest mismatch." >&2
            exit 1
          fi
          (cd verified-assets && shasum -a 256 --check SHA256SUMS)
          gh attestation verify "$DMG_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/briefcase.yml" \
            --source-digest "$GITHUB_SHA" \
            --source-ref refs/heads/main \
            --deny-self-hosted-runners
          if [ "$(shasum -a 256 verified-assets/appcast.xml | awk '{print $1}')" \
            != "$EXPECTED_APPCAST_SHA256" ]; then
            echo "Re-downloaded appcast digest mismatch." >&2
            exit 1
          fi
          if [ "$(stat -f %z verified-assets/appcast.xml)" != "$EXPECTED_APPCAST_SIZE" ]; then
            echo "Re-downloaded appcast size mismatch." >&2
            exit 1
          fi

          RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
          if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "true" ]; then
            echo "Release must still be a draft during final verification." >&2
            exit 1
          fi
          if [ "$(jq -r .target_commitish <<< "$RELEASE_JSON")" != "$GITHUB_SHA" ]; then
            echo "Draft target changed after creation." >&2
            exit 1
          fi
          DMG_ASSET_COUNT=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '[.assets[] | select(.name == $name)] | length' <<< "$RELEASE_JSON")
          APPCAST_ASSET_COUNT=$(jq '[.assets[] | select(.name == "appcast.xml")] | length' <<< "$RELEASE_JSON")
          CHECKSUM_ASSET_COUNT=$(jq '[.assets[] | select(.name == "SHA256SUMS")] | length' <<< "$RELEASE_JSON")
          TOTAL_ASSET_COUNT=$(jq '.assets | length' <<< "$RELEASE_JSON")
          if [ "$DMG_ASSET_COUNT" != "1" ] || [ "$APPCAST_ASSET_COUNT" != "1" ] \
            || [ "$CHECKSUM_ASSET_COUNT" != "1" ] || [ "$TOTAL_ASSET_COUNT" != "3" ]; then
            echo "Draft release must contain only one DMG, checksum, and appcast asset." >&2
            exit 1
          fi
          ASSET_URL=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '.assets[] | select(.name == $name) | .browser_download_url' <<< "$RELEASE_JSON")
          ASSET_SIZE=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '.assets[] | select(.name == $name) | .size' <<< "$RELEASE_JSON")
          if [ "$ASSET_SIZE" != "$EXPECTED_DMG_SIZE" ]; then
            echo "GitHub DMG asset size changed after upload." >&2
            exit 1
          fi

          python scripts/sparkle_bundle.py \
            --dmg "$DMG_PATH" \
            --release-artifact \
            --verify-signatures \
            --verify-distribution \
            > verified-bundle.json
          if [ "$(jq -r .short_version verified-bundle.json)" != "$EXPECTED_SHORT_VERSION" ] \
            || [ "$(jq -r .build_version verified-bundle.json)" != "$EXPECTED_BUILD_VERSION" ]; then
            echo "Re-downloaded DMG version metadata mismatch." >&2
            exit 1
          fi
          python scripts/sparkle_appcast.py validate-snapshot \
            --feed verified-assets/appcast.xml \
            --short-version "$EXPECTED_SHORT_VERSION"
          python scripts/sparkle_appcast.py verify-release \
            --feed verified-assets/appcast.xml \
            --build-version "$EXPECTED_BUILD_VERSION" \
            --short-version "$EXPECTED_SHORT_VERSION" \
            --download-url "$ASSET_URL" \
            --length "$ASSET_SIZE"

  publish-release:
    name: Publish verified GitHub Release
    needs:
      - build-python
      - prepare
      - package
      - verify-draft
    if: >-
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.package.result == 'success' &&
      needs.verify-draft.result == 'success' &&
      (
        needs.prepare.outputs.publish_pypi != 'true' ||
        needs.build-python.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Publish only the verified main release
        env:
          EXPECTED_DMG_NAME: ${{ needs.package.outputs.dmg_name }}
          GH_TOKEN: ${{ github.token }}
          MAKE_LATEST: ${{ needs.prepare.outputs.make_latest }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
          if [ "$(jq -r .target_commitish <<< "$RELEASE_JSON")" != "$GITHUB_SHA" ]; then
            echo "Release target no longer matches github.sha." >&2
            exit 1
          fi
          if [ "$(jq -r .draft <<< "$RELEASE_JSON")" = "true" ]; then
            MAIN_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)
            if [ "$MAIN_SHA" != "$GITHUB_SHA" ]; then
              echo "main advanced before publication; leaving the verified release as a draft." >&2
              exit 1
            fi
            EDIT_ARGS=(--draft=false)
            if [ "$PRERELEASE" = "true" ]; then
              EDIT_ARGS+=(--prerelease --latest=false)
            else
              EDIT_ARGS+=(--prerelease=false --latest)
            fi
            gh release edit "$RELEASE_TAG" "${EDIT_ARGS[@]}"
            RELEASE_JSON=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")
          fi

          if [ "$(jq -r .draft <<< "$RELEASE_JSON")" != "false" ]; then
            echo "Release publication did not complete." >&2
            exit 1
          fi
          if [ "$(jq -r .prerelease <<< "$RELEASE_JSON")" != "$PRERELEASE" ]; then
            echo "Published release channel does not match the committed version." >&2
            exit 1
          fi
          if [ "$(jq -r .published_at <<< "$RELEASE_JSON")" = "null" ]; then
            echo "Published release is missing published_at." >&2
            exit 1
          fi
          TAG_SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" --jq .object.sha)
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "Published tag does not resolve to github.sha." >&2
            exit 1
          fi
          ASSET_URL=$(jq -r --arg name "$EXPECTED_DMG_NAME" \
            '.assets[] | select(.name == $name) | .browser_download_url' <<< "$RELEASE_JSON")
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Published DMG asset URL is missing." >&2
            exit 1
          fi
          for attempt in {1..12}; do
            if curl --fail --location --silent --show-error --range 0-0 \
              "$ASSET_URL" --output /dev/null; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Published DMG did not become publicly downloadable." >&2
              exit 1
            fi
            sleep 5
          done

  publish-pypi:
    name: Publish stable Python distribution with trusted publishing
    needs:
      - build-python
      - prepare
      - publish-release
    if: >-
      !cancelled() &&
      needs.build-python.result == 'success' &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.publish_pypi == 'true' &&
      needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/bd-to-avp
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: dist

      - name: Publish with PyPI trusted publishing and attestations
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  deploy-appcast:
    name: Deploy verified appcast snapshot
    needs:
      - prepare
      - publish-appcast
      - publish-release
    uses: ./.github/workflows/sparkle-pages.yml
    with:
      operation: deploy
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      expected_appcast_sha256: ${{ needs.publish-appcast.outputs.appcast_sha256 }}
      expected_base_release_tag: ${{ needs.prepare.outputs.base_snapshot_tag }}
    permissions:
      contents: read
      id-token: write
      pages: write
