---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        # Trusted toolchain publisher for uv; see CodeQL alert triage from 2026-07-07.
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups --python 3.12

      - name: Validate committed release metadata
        run: uv run python scripts/release.py validate

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy bd_to_avp

      - name: Unit smoke tests
        run: uv run python -m unittest discover -s tests -t .

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Native shell tests
        run: uv run python scripts/native_app.py test

      - name: Import smoke
        run: >-
          uv run python -c
          "import bd_to_avp; import bd_to_avp.__main__; import bd_to_avp.app"

      - name: Build Python package
        run: uv build

      - name: Briefcase create smoke
        run: uv run python -m scripts.briefcase_app create --no-input

      - name: Briefcase build smoke
        run: uv run python -m scripts.briefcase_app build --no-input

      - name: Verify app-local FFmpeg tools
        run: uv run python scripts/verify_app_tools.py
