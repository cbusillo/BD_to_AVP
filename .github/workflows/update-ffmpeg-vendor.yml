name: Update FFmpeg Vendor Pins

on:
  workflow_dispatch:
    inputs:
      version:
        description: FFmpeg version represented by the candidate build, for example 8.1.3
        required: true
      base_url:
        description: "Base URL containing ffmpeg.zip and ffprobe.zip (must be https://ffmpeg.martin-riedl.de/…)"
        required: true

concurrency:
  group: update-ffmpeg-vendor
  cancel-in-progress: false

jobs:
  # Download candidate archives, regenerate the manifest, and run smoke tests.
  # This job executes the candidate binaries and therefore runs with read-only
  # permissions so that a malicious build cannot use write tokens.
  verify-and-update-manifest:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Refresh FFmpeg manifest
        env:
          FFMPEG_VERSION: ${{ inputs.version }}
          FFMPEG_BASE_URL: ${{ inputs.base_url }}
        run: |
          uv run python -m scripts.update_ffmpeg_manifest \
            --version "$FFMPEG_VERSION" \
            --base-url "$FFMPEG_BASE_URL"

      - name: Upload updated manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ffmpeg-manifest
          path: vendor/ffmpeg-macos-arm64.toml
          retention-days: 1

      - name: Vendor and verify FFmpeg tools
        run: |
          uv run python scripts/vendor_ffmpeg_macos.py --refresh
          ffmpeg_path="bd_to_avp/bin/ffmpeg"
          ffprobe_path="bd_to_avp/bin/ffprobe"
          "$ffmpeg_path" -hide_banner -version
          "$ffprobe_path" -hide_banner -version
          if otool -L "$ffmpeg_path" "$ffprobe_path" | grep -Eq '/opt/homebrew|/usr/local'; then
            echo "Vendored FFmpeg tools must not link to Homebrew libraries"
            exit 1
          fi

  # Create the PR using the verified manifest. This job holds write tokens but
  # never executes any downloaded binary.
  create-pr:
    needs: verify-and-update-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download updated manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ffmpeg-manifest
          path: vendor/

      - name: Create update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: automation/update-ffmpeg-vendor
          delete-branch: true
          title: Update app-local FFmpeg vendor pins to ${{ inputs.version }}
          commit-message: Update app-local FFmpeg vendor pins to ${{ inputs.version }}
          body: |
            Updates the app-local macOS arm64 FFmpeg vendor manifest.

            Version: `${{ inputs.version }}`
            Base URL: `${{ inputs.base_url }}`

            The workflow downloaded `ffmpeg.zip` and `ffprobe.zip`, regenerated archive and extracted-binary SHA256 values, verified both tools execute, and checked they do not link to Homebrew libraries.
