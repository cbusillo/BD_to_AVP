name: BluRayToVisionPro

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "26.0"
    visionOS: "26.0"

configs:
  Debug: debug
  Preview: release
  Release: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4

settings:
  base:
    CLANG_ENABLE_MODULES: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SWIFT_VERSION: "5.0"

targets:
  BluRayToVisionPro:
    type: application
    platform: macOS
    sources:
      - path: BluRayToVisionPro
      - path: ../bd_to_avp/resources/app_icon.icns
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BluRayToVisionPro/Info.plist
        MARKETING_VERSION: 0.2.143
        PRODUCT_BUNDLE_IDENTIFIER: com.shinycomputers.bd-to-avp
        PRODUCT_MODULE_NAME: BluRayToVisionPro
        PRODUCT_NAME: 3D Blu-ray to Vision Pro
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.shinycomputers.bd-to-avp.native-preview.review
          PRODUCT_NAME: 3D Blu-ray to Vision Pro Native Preview
          MARKETING_VERSION: 0.3.0
        Preview:
          ARCHS: arm64
          COPY_PHASE_STRIP: YES
          DEAD_CODE_STRIPPING: YES
          DEPLOYMENT_POSTPROCESSING: YES
          ENABLE_CODE_COVERAGE: NO
          MARKETING_VERSION: 0.3.0
          ONLY_ACTIVE_ARCH: NO
          OTHER_SWIFT_FLAGS: $(inherited) -file-prefix-map $(SRCROOT)/BluRayToVisionPro=/Sources -debug-prefix-map $(SRCROOT)/BluRayToVisionPro=/Sources -coverage-prefix-map $(SRCROOT)/BluRayToVisionPro=/Sources
          PRODUCT_BUNDLE_IDENTIFIER: com.shinycomputers.bd-to-avp.native-preview
          PRODUCT_NAME: 3D Blu-ray to Vision Pro Native Preview
          SWIFT_SERIALIZE_DEBUGGING_OPTIONS: NO
        Release:
          ARCHS: arm64
          COPY_PHASE_STRIP: YES
          DEAD_CODE_STRIPPING: YES
          DEPLOYMENT_POSTPROCESSING: YES
          ENABLE_CODE_COVERAGE: NO
          INFOPLIST_FILE: BluRayToVisionPro/Info-Release.plist
          ONLY_ACTIVE_ARCH: NO
          OTHER_SWIFT_FLAGS: $(inherited) -file-prefix-map $(SRCROOT)/BluRayToVisionPro=/Sources -debug-prefix-map $(SRCROOT)/BluRayToVisionPro=/Sources -coverage-prefix-map $(SRCROOT)/BluRayToVisionPro=/Sources
          SWIFT_SERIALIZE_DEBUGGING_OPTIONS: NO

  BluRayToVisionProTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BluRayToVisionProTests
    dependencies:
      - target: BluRayToVisionPro
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shinycomputers.bd-to-avp.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/3D Blu-ray to Vision Pro Native Preview.app/Contents/MacOS/3D Blu-ray to Vision Pro Native Preview

  SpatialPlaybackProbe:
    type: application
    platform: auto
    supportedDestinations: [visionOS]
    deploymentTarget:
      visionOS: "26.0"
    sources:
      - path: SpatialPlaybackProbe
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SpatialPlaybackProbe/Info.plist
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.shinycomputers.bd-to-avp.spatial-playback-probe
        PRODUCT_MODULE_NAME: SpatialPlaybackProbe
        PRODUCT_NAME: BD to AVP Spatial Playback
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "7"
        XROS_DEPLOYMENT_TARGET: "26.0"

  SpatialPlaybackProbeUITests:
    type: bundle.ui-testing
    platform: auto
    supportedDestinations: [visionOS]
    deploymentTarget:
      visionOS: "26.0"
    sources:
      - path: SpatialPlaybackProbeUITests
    dependencies:
      - target: SpatialPlaybackProbe
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.shinycomputers.bd-to-avp.spatial-playback-probe.ui-tests
        TARGETED_DEVICE_FAMILY: "7"
        TEST_TARGET_NAME: SpatialPlaybackProbe
        XROS_DEPLOYMENT_TARGET: "26.0"

schemes:
  BluRayToVisionPro:
    build:
      targets:
        BluRayToVisionPro: all
        BluRayToVisionProTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - BluRayToVisionProTests

  SpatialPlaybackProbe:
    build:
      targets:
        SpatialPlaybackProbe: all
    run:
      config: Debug
    test:
      targets:
        - SpatialPlaybackProbeUITests
